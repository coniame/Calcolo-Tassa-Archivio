<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Calcolo Tassa Archivio - Studio de Luca / Limosani</title>
    <style>
        :root { --primary: #2c3e50; --accent: #c0392b; --dark-green: #006400; --bg: #f8f9fa; --sig-blue: #00008b; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: #333; padding: 10px; margin: 0; }
        .container { max-width: 480px; margin: auto; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); position: relative; min-height: 94vh; display: flex; flex-direction: column; box-sizing: border-box; }
        
        header { text-align: center; margin-bottom: 10px; border-bottom: 2px solid var(--accent); padding-bottom: 8px; }
        h1 { font-size: 1.2rem; margin: 0; color: var(--primary); font-weight: 900; }
        h2 { font-size: 0.85rem; margin: 5px 0 0 0; color: #444; font-family: "Times New Roman", Times, serif; font-weight: bold; line-height: 1.2; text-transform: uppercase; }
        
        .no-print label { display: block; margin-top: 8px; font-weight: 600; font-size: 0.7rem; color: #666; }
        select, input { width: 100%; padding: 8px; margin-top: 3px; border: 1px solid #bbb; border-radius: 6px; font-size: 0.95rem; box-sizing: border-box; }
        
        .btn-forma { display: flex; gap: 5px; margin-top: 5px; }
        .btn-forma input { display: none; }
        .btn-forma label { flex: 1; background: #eee; padding: 10px; text-align: center; border-radius: 6px; cursor: pointer; font-size: 0.7rem; font-weight: bold; border: 1px solid #ddd; }
        .btn-forma input:checked + label { background: var(--primary); color: white; border-color: var(--primary); }

        .calc-box { margin-top: 10px; border: 1px solid #ddd; padding: 10px; border-radius: 8px; background: #fff; flex-grow: 1; }
        .info-header { font-size: 0.75rem; color: #666; text-align: center; font-weight: bold; border-bottom: 1px solid #eee; padding-bottom: 4px; margin-bottom: 8px; text-transform: uppercase; }
        .onorario-label { color: var(--accent); font-weight: 900; text-align: center; margin-bottom: 10px; font-size: 0.9rem; }
        
        /* Struttura Addizione: Testo a sinistra, Valore a destra */
        .row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 0.8rem; border-bottom: 1px solid #f2f2f2; }
        .bold-row { font-weight: 800; font-size: 0.85rem; margin-top: 5px; color: #000; border-bottom: none; }
        .math-line { border-top: 2px solid #000; margin: 10px 0 5px 0; }
        .grand-total { display: flex; justify-content: space-between; font-size: 1.4rem; font-weight: 900; color: var(--accent); }

        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .share-btn { flex: 1; background: var(--dark-green); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 800; cursor: pointer; font-size: 0.8rem; }
        .reset-btn { flex: 1; background: var(--accent); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 800; cursor: pointer; font-size: 0.8rem; }

        footer { text-align: center; margin-top: auto; padding: 15px 0 5px 0; }
        .signature { font-size: 1.1rem; color: var(--sig-blue); font-style: italic; font-weight: bold; }
        
        @media print {
            .no-print, .btn-group { display: none !important; }
            .container { box-shadow: none; border: none; width: 100%; max-width: 100%; min-height: auto; }
            body { background: white; }
        }
    </style>
</head>
