<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Calcolo Tassa Archivio - Studio de Luca / Limosani</title>
    <style>
        :root { --primary: #2c3e50; --accent: #c0392b; --blue: #2980b9; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: #333; padding: 15px; margin: 0; }
        .container { max-width: 550px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); position: relative; padding-bottom: 60px; }
        
        header { text-align: center; margin-bottom: 25px; border-bottom: 2px solid var(--accent); padding-bottom: 15px; }
        h1 { font-size: 1.8rem; margin: 0; color: var(--primary); font-weight: 800; }
        h2 { font-size: 1rem; margin: 5px 0 0 0; color: #666; font-weight: 400; text-transform: uppercase; letter-spacing: 1px; }
        
        label { display: block; margin-top: 15px; font-weight: 600; font-size: 0.85rem; color: #555; }
        select, input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; box-sizing: border-box; }
        
        .btn-forma { display: flex; gap: 8px; margin-top: 10px; }
        .btn-forma input { display: none; }
        .btn-forma label { flex: 1; background: #eee; padding: 12px; text-align: center; border-radius: 8px; cursor: pointer; font-size: 0.75rem; font-weight: bold; border: 1px solid #ddd; }
        .btn-forma input:checked + label { background: var(--primary); color: white; border-color: var(--primary); }

        .calc-box { margin-top: 25px; border: 1px solid #eee; padding: 20px; border-radius: 10px; background: #fff; }
        .onorario-ref { color: var(--accent); font-weight: bold; text-align: center; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; font-size: 0.95rem; }
        
        /* Layout richiesto: descrizione a sinistra, importo a destra */
        .row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 0.95rem; border-bottom: 1px solid #f9f9f9; }
        .bold-row { font-weight: 800; font-size: 1.05rem; margin-top: 8px; color: #000; border-bottom: none; }
        
        .math-line { border-top: 2px solid #000; margin: 15px 0 10px 0; }
        .grand-total { display: flex; justify-content: space-between; font-size: 1.6rem; font-weight: 900; color: var(--accent); }

        footer { position: absolute; bottom: 15px; left: 0; width: 100%; text-align: center; font-size: 0.7rem; color: #999; font-style: italic; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 25px; }
        .share-btn { flex: 2; background: var(--blue); color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .reset-btn { flex: 1; background: #95a5a6; color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        @media print {
            .no-print, .btn-group { display: none !important; }
            .container { box-shadow: none; border: none; width: 100%; max-width: 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>CALCOLO TASSA ARCHIVIO</h1>
        <h2>Studio Notarile Associato de Luca / Limosani</h2>
    </header>

    <div class="no-print">
        <div class="btn-forma">
            <input type="radio" name="forma" id="pub" value="pub" checked><label for="pub">ATTO PUBBLICO</label>
            <input type="radio" name="forma" id="priv" value="priv"><label for="priv">SCRITTURA PRIVATA</label>
        </div>

        <label>Tipo di Atto (dal Prontuario)</label>
        <select id="tipoAtto">
            <optgroup label="Atti Frequenti">
                <option value="FISSO_37">Accettazione Espressa di Eredità (€ 37,00)</option>
                <option value="25%">Assegnazione Alloggio Cooperativa ERP (25%)</option>
                <option value="FISSO_74">Atto d'Obbligo verso P.A. (€ 74,00)</option>
                <option value="FISSO_37">Atto di Notorietà (€ 37,00)</option>
                <option value="50%">Cancellazione Ipoteca / Quietanza (50%)</option>
                <option value="70%">Compravendita Prezzo-Valore (70%)</option>
                <option value="100%">Compravendita Standard / PEEP (100%)</option>
                <option value="100%">Donazione Immobili (100%)</option>
                <option value="50%">Mutuo Fondiario (50%)</option>
                <option value="100%">Mutuo Ipotecario Ordinario (100%)</option>
            </optgroup>
            <optgroup label="Percentuali di Base">
                <option value="100%">Misura Intera (100%)</option>
                <option value="70%">Riduzione Prezzo-Valore (70%)</option>
                <option value="50%">Riduzione 50%</option>
                <option value="25%">Riduzione 75% (paga 25%)</option>
            </optgroup>
        </select>

        <div id="valoreArea">
            <label>Valore Atto o Ipoteca (€)</label>
            <input type="text" id="valoreAtto" placeholder="es. 150.000,00">
        </div>
    </div>

    <div class="calc-box" id="risultatoBox">
        <div id="onorarioLabel" class="onorario-ref">Inserisci i dati per il calcolo</div>
        <div id="displayRisultati"></div>
    </div>

    <div class="btn-group no-print">
        <button class="share-btn" onclick="window.print()">STAMPA / CONDIVIDI PDF</button>
        <button class="reset-btn" onclick="window.location.reload()">RESET</button>
    </div>

    <footer>App by Pasquale Barone</footer>
</div>

<script>
    // Database scaglioni integrali dai CSV caricati [cite: 1-12, 14-25]
    const SCAGLIONI_PUB = [
        {max: 37000, h: { "100%": 275, "70%": 193, "50%": 138, "25%": 69 }, c: 0.22},
        {max: 55800, h: { "100%": 320, "70%": 224, "50%": 160, "25%": 80 }, c: 0.42},
        {max: 74400, h: { "100%": 354, "70%": 248, "50%": 177, "25%": 89 }, c: 0.42},
        {max: 93000, h: { "100%": 400, "70%": 280, "50%": 200, "25%": 100 }, c: 0.42},
        {max: 139500, h: { "100%": 434, "70%": 304, "50%": 217, "25%": 109 }, c: 0.42},
        {max: 186000, h: { "100%": 480, "70%": 336, "50%": 240, "25%": 120 }, c: 0.42},
        {max: 232400, h: { "100%": 514, "70%": 360, "50%": 257, "25%": 129 }, c: 0.42},
        {max: 280000, h: { "100%": 560, "70%": 392, "50%": 280, "25%": 140 }, c: 0.42},
        {max: 370000, h: { "100%": 594, "70%": 416, "50%": 297, "25%": 149 }, c: 0.42},
        {max: 465000, h: { "100%": 674, "70%": 472, "50%": 337, "25%": 169 }, c: 0.42},
        {max: 695000, h: { "100%": 754, "70%": 528, "50%": 377, "25%": 189 }, c: 0.42},
        {max: 930000, h: { "100%": 879, "70%": 615, "50%": 440, "25%": 220 }, c: 0.42},
        {max: 1162000, h: { "100%": 948, "70%": 664, "50%": 474, "25%": 237 }, c: 0.42},
        {max: 1395000, h: { "100%": 1028, "70%": 720, "50%": 514, "25%": 257 }, c: 0.42},
        {max: 1625000, h: { "100%": 1074, "70%": 752, "50%": 537, "25%": 269 }, c: 0.42},
        {max: 1860000, h: { "100%": 1108, "70%": 776, "50%": 554, "25%": 277 }, c: 0.42},
        {max: 2325000, h: { "100%": 1154, "70%": 808, "50%": 577, "25%": 289 }, c: 0.42},
        {max: 2790000, h: { "100%": 1188, "70%": 832, "50%": 594, "25%": 297 }, c: 0.42},
        {max: 3255000, h: { "100%": 1235, "70%": 865, "50%": 618, "25%": 309 }, c: 0.42},
        {max: 3720000, h: { "100%": 1268, "70%": 888, "50%": 634, "25%": 317 }, c: 0.42},
        {max: 4185000, h: { "100%": 1314, "70%": 920, "50%": 657, "25%": 329 }, c: 0.42},
        {max: 4650000, h: { "100%": 1348, "70%": 944, "50%": 674, "25%": 337 }, c: 0.42},
        {max: Infinity, h: { "100%": 1394, "70%": 976, "50%": 697, "25%": 349 }, c: 0.42}
    ];

    const SCAGLIONI_PRIV = [
        {max: 37000, h: { "100%": 261, "70%": 183, "50%": 131, "25%": 65 }, c: 0.22},
        {max: 55800, h: { "100%": 304, "70%": 213, "50%": 152, "25%": 76 }, c: 0.42},
        {max: 74400, h: { "100%": 336, "70%": 235, "50%": 168, "25%": 84 }, c: 0.42},
        {max: 93000, h: { "100%": 380, "70%": 266, "50%": 190, "25%": 95 }, c: 0.42},
        {max: 139500, h: { "100%": 412, "70%": 288, "50%": 206, "25%": 103 }, c: 0.42},
        {max: 186000, h: { "100%": 456, "70%": 319, "50%": 228, "25%": 114 }, c: 0.42},
        {max: 232400, h: { "100%": 488, "70%": 342, "50%": 244, "25%": 122 }, c: 0.42},
        {max: 280000, h: { "100%": 532, "70%": 372, "50%": 266, "25%": 133 }, c: 0.42},
        {max: 370000, h: { "100%": 564, "70%": 395, "50%": 282, "25%": 141 }, c: 0.42},
        {max: 465000, h: { "100%": 640, "70%": 448, "50%": 320, "25%": 160 }, c: 0.42},
        {max: 695000, h: { "100%": 716, "70%": 501, "50%": 358, "25%": 179 }, c: 0.42},
        {max: 930000, h: { "100%": 835, "70%": 585, "50%": 418, "25%": 209 }, c: 0.42},
        {max: 1162000, h: { "100%": 900, "70%": 630, "50%": 450, "25%": 225 }, c: 0.42},
        {max: 1395000, h: { "100%": 976, "70%": 683, "50%": 488, "25%": 244 }, c: 0.42},
        {max: 1625000, h: { "100%": 1020, "70%": 714, "50%": 510, "25%": 255 }, c: 0.42},
        {max: 1860000, h: { "100%": 1052, "70%": 736, "50%": 526, "25%": 263 }, c: 0.42},
        {max: 2325000, h: { "100%": 1096, "70%": 767, "50%": 548, "25%": 274 }, c: 0.42},
        {max: 2790000, h: { "100%": 1128, "70%": 790, "50%": 564, "25%": 282 }, c: 0.42},
        {max: 3255000, h: { "100%": 1173, "70%": 821, "50%": 587, "25%": 293 }, c: 0.42},
        {max: 3720000, h: { "100%": 1204, "70%": 843, "50%": 602, "25%": 301 }, c: 0.42},
        {max: 4185000, h: { "100%": 1248, "70%": 874, "50%": 624, "25%": 312 }, c: 0.42},
        {max: 4650000, h: { "100%": 1280, "70%": 896, "50%": 640, "25%": 320 }, c: 0.42},
        {max: Infinity, h: { "100%": 1324, "70%": 927, "50%": 662, "25%": 331 }, c: 0.42}
    ];

    const fmt = new Intl.NumberFormat('it-IT', { style: 'currency', currency: 'EUR' });
    const inputField = document.getElementById('valoreAtto');

    // Funzione di formattazione europea per l'input
    inputField.addEventListener('input', function(e) {
        let val = e.target.value.replace(/\D/g, "");
        if (val === "") { e.target.value = ""; return; }
        let num = (parseFloat(val) / 100);
        e.target.value = num.toLocaleString('it-IT', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        update();
    });

    function parseLocaleNumber(str) {
        return parseFloat(str.replace(/\./g, "").replace(",", ".")) || 0;
    }

    function update() {
        const val = parseLocaleNumber(inputField.value);
        const tipoAtto = document.getElementById('tipoAtto').value;
        const isPub = document.getElementById('pub').checked;
        const db = isPub ? SCAGLIONI_PUB : SCAGLIONI_PRIV;

        let onorario = 0;
        let cassaPerc = 0.42;

        // Gestione Onorario Fisso o a Scaglione
        if (tipoAtto.startsWith("FISSO_")) {
            onorario = parseInt(tipoAtto.split("_")[1]);
            document.getElementById('valoreArea').style.opacity = "0.3";
        } else {
            const fascia = db.find(x => val <= x.max) || db[db.length - 1];
            onorario = fascia.h[tipoAtto] || 0;
            cassaPerc = fascia.c;
            document.getElementById('valoreArea').style.opacity = "1";
        }

        if (onorario === 0 && !tipoAtto.startsWith("FISSO_")) {
            document.getElementById('onorarioLabel').textContent = "Inserisci un valore per procedere";
            document.getElementById('displayRisultati').innerHTML = "";
            return;
        }

        // Calcoli scomposizione (arrotondamento 2 decimali) 
        const tArchivio = Math.round(onorario * 0.10 * 100) / 100;
        const cNaz = Math.round(onorario * cassaPerc * 100) / 100;
        const cCons = Math.round(onorario * 0.04 * 100) / 100;
        const fGar = Math.round(onorario * 0.002 * 100) / 100;
        const assic = Math.round(onorario * 0.06 * 100) / 100;

        // A) Totale descritti (Tassa Archivio + Cassa Naz + Cassa Cons + Fondo + Assicurazione)
        const totA = tArchivio + cNaz + cCons + fGar + assic;

        // B) IVA 22% (esclusa Tassa Archivio dalla base imponibile) 
        const baseIVA = cNaz + cCons + fGar + assic;
        const ivaVal = Math.round(baseIVA * 0.22 * 100) / 100;

        const totaleFinale = totA + ivaVal;

        document.getElementById('onorarioLabel').textContent = "Onorario Repertorio: " + fmt.format(onorario);
        
        document.getElementById('displayRisultati').innerHTML = `
            <div class="row"><span>Tassa Archivio (10%)</span><span>${fmt.format(tArchivio)}</span></div>
            <div class="row"><span>Cassa Naz. Notariato (${(cassaPerc*100).toFixed(0)}%)</span><span>${fmt.format(cNaz)}</span></div>
            <div class="row"><span>Cassa Cons. Notariato (4%)</span><span>${fmt.format(cCons)}</span></div>
            <div class="row"><span>Fondo Garanzia (0,20%)</span><span>${fmt.format(fGar)}</span></div>
            <div class="row"><span>Assicurazione Obbligatoria (6,00%)</span><span>${fmt.format(assic)}</span></div>
            
            <div class="bold-row row"><span>A) - Totale Imposte e Contributi</span><span>${fmt.format(totA)}</span></div>
            <div class="bold-row row"><span>B) - IVA 22% (esclusa Tassa Archivio)</span><span>${fmt.format(ivaVal)}</span></div>
            
            <div class="math-line"></div>
            <div class="grand-total"><span>TOTALE (A + B)</span><span>${fmt.format(totaleFinale)}</span></div>
        `;
    }

    // Event listeners
    document.getElementById('tipoAtto').addEventListener('change', update);
    document.querySelectorAll('input[name="forma"]').forEach(el => el.addEventListener('change', update));
</script>

</body>
</html>
