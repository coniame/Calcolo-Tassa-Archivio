<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Calcolo Tassa Archivio - Studio de Luca / Limosani</title>
    <style>
        :root { --primary: #2c3e50; --accent: #c0392b; --dark-green: #006400; --bg: #f5f7f8; --signature-blue: #00008b; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: #333; padding: 10px; margin: 0; }
        .container { max-width: 450px; margin: auto; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); position: relative; min-height: 94vh; display: flex; flex-direction: column; box-sizing: border-box; }
        
        header { text-align: center; margin-bottom: 10px; border-bottom: 2px solid var(--accent); padding-bottom: 8px; }
        h1 { font-size: 1.1rem; margin: 0; color: var(--primary); font-weight: 900; }
        h2 { font-size: 0.85rem; margin: 5px 0 0 0; color: #444; font-family: "Times New Roman", Times, serif; font-weight: bold; line-height: 1.2; }
        
        label { display: block; margin-top: 8px; font-weight: 600; font-size: 0.7rem; color: #666; }
        select, input { width: 100%; padding: 8px; margin-top: 3px; border: 1px solid #bbb; border-radius: 6px; font-size: 0.9rem; box-sizing: border-box; }
        
        .btn-forma { display: flex; gap: 5px; margin-top: 5px; }
        .btn-forma input { display: none; }
        .btn-forma label { flex: 1; background: #f0f0f0; padding: 10px; text-align: center; border-radius: 6px; cursor: pointer; font-size: 0.7rem; font-weight: bold; border: 1px solid #ccc; }
        .btn-forma input:checked + label { background: var(--primary); color: white; border-color: var(--primary); }

        .calc-box { margin-top: 10px; border: 1px solid #ddd; padding: 10px; border-radius: 8px; background: #fff; flex-grow: 1; }
        .info-header { font-size: 0.7rem; color: #666; text-align: center; font-weight: bold; border-bottom: 1px solid #eee; padding-bottom: 4px; margin-bottom: 6px; text-transform: uppercase; }
        .onorario-val { color: var(--accent); font-weight: 900; text-align: center; margin-bottom: 8px; font-size: 0.9rem; }
        
        .row { display: flex; justify-content: space-between; padding: 3px 0; font-size: 0.78rem; border-bottom: 1px solid #f9f9f9; }
        .bold-row { font-weight: 800; font-size: 0.82rem; margin-top: 4px; color: #000; border-bottom: none; }
        .math-line { border-top: 2px solid #000; margin: 8px 0 4px 0; }
        .grand-total { display: flex; justify-content: space-between; font-size: 1.3rem; font-weight: 900; color: var(--accent); }

        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .share-btn { flex: 1; background: var(--dark-green); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 800; cursor: pointer; font-size: 0.8rem; height: 45px; }
        .reset-btn { flex: 1; background: var(--accent); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 800; cursor: pointer; font-size: 0.8rem; height: 45px; }

        footer { text-align: center; margin-top: auto; padding: 10px 0 5px 0; }
        .signature { font-size: 1rem; color: var(--signature-blue); font-style: italic; font-weight: bold; }
