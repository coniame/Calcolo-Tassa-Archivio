<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Calcolo Tassa Archivio - Studio de Luca / Limosani</title>
    <style>
        :root { --primary: #2c3e50; --accent: #c0392b; --dark-green: #006400; --bg: #f4f7f6; --signature-blue: #00008b; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: #333; padding: 10px; margin: 0; }
        .container { max-width: 480px; margin: auto; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); position: relative; min-height: 94vh; display: flex; flex-direction: column; box-sizing: border-box; }
        
        header { text-align: center; margin-bottom: 10px; border-bottom: 2px solid var(--accent); padding-bottom: 10px; }
        h1 { font-size: 1.6rem; margin: 0; color: var(--primary); font-weight: 900; }
        h2 { font-size: 1rem; margin: 5px 0 0 0; color: #444; font-family: "Times New Roman", Times, serif; font-weight: bold; line-height: 1.3; }
        
        label { display: block; margin-top: 8px; font-weight: 600; font-size: 0.75rem; color: #666; }
        select, input { width: 100%; padding: 10px; margin-top: 3px; border: 1px solid #bbb; border-radius: 6px; font-size: 0.95rem; box-sizing: border-box; }
        
        .btn-forma { display: flex; gap: 5px; margin-top: 5px; }
        .btn-forma input { display: none; }
        .btn-forma label { flex: 1; background: #f0f0f0; padding: 10px; text-align: center; border-radius: 6px; cursor: pointer; font-size: 0.7rem; font-weight: bold; border: 1px solid #ccc; }
        .btn-forma input:checked + label { background: var(--primary); color: white; border-color: var(--primary); }

        .calc-box { margin-top: 15px; border: 1px solid #ddd; padding: 12px; border-radius: 8px; background: #fff; flex-grow: 1; font-size: 0.82rem; }
        .info-header { font-size: 0.75rem; color: #666; text-align: center; font-weight: bold; border-bottom: 1px solid #eee; padding-bottom: 5px; margin-bottom: 8px; text-transform: uppercase; }
        .onorario-val { color: var(--accent); font-weight: 900; text-align: center; margin-bottom: 10px; font-size: 0.95rem; }
        
        .row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #f9f9f9; }
        .bold-row { font-weight: 800; font-size: 0.85rem; margin-top: 6px; color: #000; border-bottom: none; }
        .math-line { border-top: 2px solid #000; margin: 10px 0 5px 0; }
        .grand-total { display: flex; justify-content: space-between; font-size: 1.4rem; font-weight: 900; color: var(--accent); }

        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .share-btn { flex: 1; background: var(--dark-green); color: white; border: none; padding: 14px; border-radius: 8px; font-weight: 800; cursor: pointer; font-size: 0.85rem; }
        .reset-btn { flex: 1; background: var(--accent); color: white; border: none; padding: 14px; border-radius: 8px; font-weight: 800; cursor: pointer; font-size: 0.85rem; }

        footer { text-align: center; margin-top: auto; padding: 20px 0 5px 0; }
        .signature { font-size: 1.2rem; color: var(--signature-blue); font-style: italic; font-weight: bold; }
        
        @media print {
            .no-print, .btn-group { display: none !important; }
            .container { box-shadow: none; border: none; width: 100%; max-width: 100%; min-height: auto; }
            body { background: white; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>CALCOLO TASSA ARCHIVIO</h1>
        <h2>Studio Notarile Associato Massimo de Luca di Roseto / Angela Limosani</h2>
    </header>

    <div class="no-print">
        <div class="btn-forma">
            <input type="radio" name="forma" id="pub" value="pub" checked><label for="pub">ATTO PUBBLICO</label>
            <input type="radio" name="forma" id="priv" value="priv"><label for="priv">SCRITTURA PRIVATA</label>
        </div>

        <label>Tipo di Atto / Percentuale</label>
        <select id="tipoAtto">
            <optgroup label="Atti Prontuario">
                <option value="FISSO_37">Accettazione Eredità (€ 37,00)</option>
                <option value="25%">Assegnazione ERP (25%)</option>
                <option value="FISSO_74">Atto d'Obbligo P.A. (€ 74,00)</option>
                <option value="FISSO_37">Atto di Notorietà (€ 37,00)</option>
                <option value="50%">Cancellazione / Quietanza (50%)</option>
                <option value="70%">Compravendita Prezzo-Valore (70%)</option>
                <option value="100%">Compravendita Standard / PEEP (100%)</option>
                <option value="100%">Donazione Immobili (100%)</option>
                <option value="50%">Mutuo Fondiario (50%)</option>
                <option value="100%">Mutuo Ipotecario Ordinario (100%)</option>
                <option value="FISSO_186">Verbale Assemblea Straord. (€ 186,00)</option>
            </optgroup>
            <optgroup label="Percentuali di Base">
                <option value="100%">Misura Intera (100%)</option>
                <option value="70%">Riduzione 70%</option>
                <option value="50%">Riduzione 50%</option>
                <option value="25%">Riduzione 25%</option>
            </optgroup>
        </select>

        <label id="lblVal">Valore Atto / Ipoteca (€)</label>
        <input type="text" id="valoreInput" placeholder="es. 150.000">
    </div>

    <div class="calc-box">
        <div id="descrizioneAtto" class="info-header">Configura i dati sopra</div>
        <div id="labelOnorario" class="onorario-val"></div>
        <div id="areaDettagli"></div>
    </div>

    <div class="btn-group no-print">
        <button class="share-btn" onclick="window.print()">CONDIVIDI PDF</button>
        <button class="reset-btn" onclick="window.location.reload()">RESET CALCOLO</button>
    </div>

    <footer>
        <span class="signature">by Pasquale Barone ©</span>
    </footer>
</div>
