<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Calcolo Tassa Archivio - Studio de Luca / Limosani</title>
    <style>
        :root { --primary: #2c3e50; --accent: #c0392b; --blue: #2980b9; --bg: #f2f4f5; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: #333; padding: 10px; margin: 0; }
        .container { max-width: 480px; margin: auto; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); position: relative; min-height: 92vh; display: flex; flex-direction: column; }
        
        header { text-align: center; margin-bottom: 10px; border-bottom: 1.5px solid var(--accent); padding-bottom: 8px; }
        h1 { font-size: 1.3rem; margin: 0; color: var(--primary); font-weight: 800; }
        h2 { font-size: 0.95rem; margin: 3px 0 0 0; color: #555; font-family: "Times New Roman", Times, serif; font-weight: bold; text-transform: uppercase; }
        
        label { display: block; margin-top: 8px; font-weight: 600; font-size: 0.75rem; color: #666; }
        select, input { width: 100%; padding: 8px; margin-top: 3px; border: 1px solid #ccc; border-radius: 6px; font-size: 0.9rem; box-sizing: border-box; }
        
        .btn-forma { display: flex; gap: 5px; margin-top: 5px; }
        .btn-forma input { display: none; }
        .btn-forma label { flex: 1; background: #eee; padding: 8px; text-align: center; border-radius: 6px; cursor: pointer; font-size: 0.7rem; font-weight: bold; border: 1px solid #ddd; }
        .btn-forma input:checked + label { background: var(--primary); color: white; border-color: var(--primary); }

        .calc-box { margin-top: 12px; border: 1px solid #eee; padding: 12px; border-radius: 8px; background: #fff; flex-grow: 1; }
        .info-atto { font-size: 0.75rem; color: #7f8c8d; text-align: center; margin-bottom: 2px; font-weight: bold; text-transform: uppercase; }
        .onorario-ref { color: var(--accent); font-weight: bold; text-align: center; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px; font-size: 0.85rem; }
        
        .row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 0.8rem; border-bottom: 1px solid #f2f2f2; }
        .bold-row { font-weight: 800; font-size: 0.85rem; margin-top: 5px; color: #000; border-bottom: none; }
        .math-line { border-top: 1.5px solid #000; margin: 8px 0 5px 0; }
        .grand-total { display: flex; justify-content: space-between; font-size: 1.3rem; font-weight: 900; color: var(--accent); }

        .btn-group { display: flex; gap: 8px; margin-top: 15px; }
        .share-btn { flex: 2; background: var(--blue); color: white; border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 0.8rem; }
        .reset-btn { flex: 1; background: #95a5a6; color: white; border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 0.8rem; }

        footer { text-align: center; margin-top: auto; padding-top: 15px; }
        .signature { font-size: 1rem; color: #add8e6; font-style: italic; font-weight: bold; }
        
        @media print {
            .no-print, .btn-group { display: none !important; }
            .container { box-shadow: none; border: none; width: 100%; max-width: 100%; min-height: auto; }
            footer { display: block; margin-top: 50px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>CALCOLO TASSA ARCHIVIO</h1>
        <h2>Studio Notarile Associato de Luca / Limosani</h2>
    </header>

    <div class="no-print">
        <div class="btn-forma">
            <input type="radio" name="forma" id="pub" value="pub" checked><label for="pub">ATTO PUBBLICO</label>
            <input type="radio" name="forma" id="priv" value="priv"><label for="priv">SCRITTURA PRIVATA</label>
        </div>

        <label>Tipo di Atto</label>
        <select id="tipoAtto">
            <optgroup label="Prontuario Atti">
                <option value="FISSO_37">Accettazione Espressa di Eredità (€ 37,00)</option>
                <option value="25%">Assegnazione Alloggio Coop. ERP (25%)</option>
                <option value="FISSO_74">Atto d'Obbligo verso P.A. (€ 74,00)</option>
                <option value="FISSO_37">Atto di Notorietà (€ 37,00)</option>
                <option value="50%">Cancellazione Ipoteca / Quietanza (50%)</option>
                <option value="70%">Compravendita Prezzo-Valore (70%)</option>
                <option value="100%">Compravendita Standard / PEEP (100%)</option>
                <option value="100%">Donazione Immobili (100%)</option>
                <option value="50%">Mutuo Fondiario (50%)</option>
                <option value="100%">Mutuo Ipotecario Ordinario (100%)</option>
            </optgroup>
            <optgroup label="Aliquote Manuali">
                <option value="100%">Misura Intera (100%)</option>
                <option value="70%">Riduzione Prezzo-Valore (70%)</option>
                <option value="50%">Riduzione 50%</option>
                <option value="25%">Riduzione 75% (paga 25%)</option>
            </optgroup>
        </select>

        <div id="valoreArea">
            <label>Valore Atto / Ipoteca (€)</label>
            <input type="text" id="valoreAtto" placeholder="es. 150.000">
        </div>
    </div>

    <div class="calc-box">
        <div id="identificativoAtto" class="info-atto"></div>
        <div id="onorarioLabel" class="onorario-ref">Inserisci i dati...</div>
        <div id="displayRisultati"></div>
    </div>

    <div class="btn-group no-print">
        <button class="share-btn" onclick="window.print()">CONDIVIDI PDF</button>
        <button class="reset-btn" onclick="window.location.reload()">RESET</button>
    </div>

    <footer>
        <span class="signature">by Pasquale Barone ©</span>
    </footer>
</div>
