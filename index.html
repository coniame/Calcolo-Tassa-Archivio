<!DOCTYPE html>
<html lang="it">
<head>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Calcolo Tassa Archivio - Studio de Luca / Limosani</title>
    <style>
        :root { --primary: #2c3e50; --accent: #c0392b; --dark-green: #006400; --bg: #f8f9fa; --sig-blue: #00008b; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: #333; padding: 10px; margin: 0; }
        .container { max-width: 480px; margin: auto; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); position: relative; min-height: 94vh; display: flex; flex-direction: column; box-sizing: border-box; }
        
        header { text-align: center; margin-bottom: 10px; border-bottom: 2px solid var(--accent); padding-bottom: 8px; }
        h1 { font-size: 1.2rem; margin: 0; color: var(--primary); font-weight: 900; }
        h2 { font-size: 0.85rem; margin: 5px 0 0 0; color: #444; font-family: "Times New Roman", Times, serif; font-weight: bold; line-height: 1.2; text-transform: uppercase; }
        
        .no-print label { display: block; margin-top: 8px; font-weight: 600; font-size: 0.7rem; color: #666; }
        select, input { width: 100%; padding: 10px; margin-top: 3px; border: 1px solid #bbb; border-radius: 6px; font-size: 0.95rem; box-sizing: border-box; }
        
        .btn-forma { display: flex; gap: 5px; margin-top: 5px; }
        .btn-forma input { display: none; }
        .btn-forma label { flex: 1; background: #eee; padding: 10px; text-align: center; border-radius: 6px; cursor: pointer; font-size: 0.7rem; font-weight: bold; border: 1px solid #ddd; }
        .btn-forma input:checked + label { background: var(--primary); color: white; border-color: var(--primary); }

        .calc-box { margin-top: 10px; border: 1px solid #ddd; padding: 12px; border-radius: 8px; background: #fff; flex-grow: 1; }
        .info-header { font-size: 0.75rem; color: #666; text-align: center; font-weight: bold; border-bottom: 1px solid #eee; padding-bottom: 4px; margin-bottom: 8px; text-transform: uppercase; }
        .onorario-label { color: var(--accent); font-weight: 900; text-align: center; margin-bottom: 10px; font-size: 0.9rem; }
        
        /* Struttura rigorosa: testo a sinistra, importo a destra */
        .row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 0.75rem; border-bottom: 1px solid #f2f2f2; }
        .bold-row { font-weight: 800; font-size: 0.78rem; margin-top: 5px; color: #000; border-bottom: none; }
        .math-line { border-top: 2px solid #000; margin: 10px 0 5px 0; }
        .grand-total { display: flex; justify-content: space-between; font-size: 1.2rem; font-weight: 900; color: var(--accent); }

        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .share-btn { flex: 1; background: var(--dark-green); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 800; cursor: pointer; font-size: 0.8rem; height: 45px; }
        .reset-btn { flex: 1; background: var(--accent); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 800; cursor: pointer; font-size: 0.8rem; height: 45px; }

        footer { text-align: center; margin-top: auto; padding: 15px 0 5px 0; }
        .signature { font-size: 1.1rem; color: var(--sig-blue); font-style: italic; font-weight: bold; }
        
        @media print {
            .no-print, .btn-group { display: none !important; }
            .container { box-shadow: none; border: none; width: 100%; max-width: 100%; min-height: auto; }
            body { background: white; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>CALCOLO TASSA ARCHIVIO</h1>
        <h2>Studio Notarile Associato Massimo de Luca di Roseto / Angela Limosani</h2>
    </header>

    <div class="no-print">
        <div class="btn-forma">
            <input type="radio" name="forma" id="pub" value="pub" checked><label for="pub">ATTO PUBBLICO</label>
            <input type="radio" name="forma" id="priv" value="priv"><label for="priv">SCRITTURA PRIVATA</label>
        </div>

        <label>Tipo di Atto / Percentuale</label>
        <select id="boxTipoAtto">
            <optgroup label="Elenco Atti">
                <option value="FISSO_37">Accettazione Espressa di Eredità (€ 37)</option>
                <option value="25%">Assegnazione Alloggio da Cooperativa ERP (25%)</option>
                <option value="FISSO_74">Atto d'Obbligo verso la P.A. (€ 74)</option>
                <option value="FISSO_37">Atto di Asseverazione e Giuramento (€ 37)</option>
                <option value="50%">Atto di Consenso alla Cancellazione di Ipoteca (50%)</option>
                <option value="FISSO_37">Atto di Notorietà (€ 37)</option>
                <option value="50%">Atto di Quietanza di Mutuo / Surroga (50%)</option>
                <option value="FISSO_37">Atto di Ratifica o Conferma (€ 37)</option>
                <option value="100%">Atto di Vincolo di Destinazione (100%)</option>
                <option value="100%">Aumento di Capitale a Pagamento (100%)</option>
                <option value="FISSO_11">Cancellazione Ipoteca su Autoveicolo (€ 11)</option>
                <option value="70%">Compravendita Immobiliare Prezzo-Valore (70%)</option>
                <option value="100%">Compravendita Immobiliare Standard / PEEP (100%)</option>
                <option value="70%">Compravendita Nuda Proprietà Prezzo-Valore (70%)</option>
                <option value="FISSO_37">Convenzione Scelta Regime Patrimoniale (€ 37)</option>
                <option value="FISSO_186">Convenzione Urbanistica / Lottizzazione (€ 186)</option>
                <option value="100%">Costituzione di Servitù Prediali (100%)</option>
                <option value="100%">Costituzione di Società (Capitali o Persone) (100%)</option>
                <option value="70%">Costituzione Usufrutto Prezzo-Valore (70%)</option>
                <option value="FISSO_37">Deposito di Atto Estero (€ 37)</option>
                <option value="100%">Divisione Immobiliare / di Eredità (100%)</option>
                <option value="100%">Donazione di Azienda / Immobili (100%)</option>
                <option value="FISSO_74">Fondo Patrimoniale tra Coniugi (€ 74)</option>
                <option value="100%">Fusione per Incorporazione Società (100%)</option>
                <option value="50%">Mutuo Agrario / Fondiario (50%)</option>
                <option value="100%">Mutuo Ipotecario Ordinario (100%)</option>
                <option value="100%">Permuta Immobiliare (100%)</option>
                <option value="FISSO_19">Procura alle Liti / Speciale (€ 19)</option>
                <option value="FISSO_37">Procura Generale ad Affari (€ 37)</option>
                <option value="FISSO_37">Rettifica di Errore Materiale (€ 37)</option>
                <option value="FISSO_12">Rilascio Copia Conforme / Estratto (€ 12)</option>
                <option value="FISSO_37">Rinuncia ad Eredità o a Legato (€ 37)</option>
                <option value="100%">Scioglimento / Scissione di Società (100%)</option>
                <option value="FISSO_18">Trasferimento Autoveicolo > 20 CV (€ 18)</option>
                <option value="100%">Trasformazione Societaria (100%)</option>
                <option value="FISSO_186">Verbale Assemblea Straord. / Constatazione (€ 186)</option>
                <option value="FISSO_74">Verbale Pubblicazione Testamento (€ 74)</option>
                <option value="FISSO_12">Vidimazione Libri Sociali (€ 12)</option>
            </optgroup>
            <optgroup label="Percentuali di Base">
                <option value="100%">Misura Intera (100%)</option>
                <option value="70%">Riduzione 70%</option>
                <option value="50%">Riduzione 50%</option>
                <option value="25%">Riduzione 25%</option>
            </optgroup>
        </select>

        <label id="lblVal">Valore Atto / Ipoteca (€)</label>
        <input type="text" id="boxValoreInput" placeholder="es. 150.000" inputmode="decimal" autocomplete="off">
    </div>

    <div class="calc-box">
        <div id="boxHeaderUI" class="info-header">Attesa inserimento valore</div>
        <div id="boxOnorarioUI" class="onorario-label"></div>
        <div id="boxValoreImputatoUI" style="color: #444; font-weight: 800; text-align: center; margin-bottom: 12px; font-size: 0.85rem;"></div>
        <div id="boxRisultatiUI"></div>
    </div>

    <div class="btn-group no-print">
        <button id="btnStampa" class="share-btn">CONDIVIDI PDF</button>
        <button id="btnReset" class="reset-btn">RESET CALCOLO</button>
    </div>

    <footer>
        <span class="signature">by Pasquale Barone ©</span>
    </footer>
</div>

<script>
    // Database scaglioni esatti
    const PUB = [
        {max: 37000, h:{"100%":275, "70%":193, "50%":138, "25%":69}, c:0.22},
        {max: 55800, h:{"100%":320, "70%":224, "50%":160, "25%":80}, c:0.42},
        {max: 74400, h:{"100%":354, "70%":248, "50%":177, "25%":89}, c:0.42},
        {max: 93000, h:{"100%":400, "70%":280, "50%":200, "25%":100}, c:0.42},
        {max: 139500, h:{"100%":434, "70%":304, "50%":217, "25%":109}, c:0.42},
        {max: 186000, h:{"100%":480, "70%":336, "50%":240, "25%":120}, c:0.42},
        {max: 232400, h:{"100%":514, "70%":360, "50%":257, "25%":129}, c:0.42},
        {max: 280000, h:{"100%":560, "70%":392, "50%":280, "25%":140}, c:0.42},
        {max: 370000, h:{"100%":594, "70%":416, "50%":297, "25%":149}, c:0.42},
        {max: 465000, h:{"100%":674, "70%":472, "50%":337, "25%":169}, c:0.42},
        {max: 695000, h:{"100%":754, "70%":528, "50%":377, "25%":189}, c:0.42},
        {max: 930000, h:{"100%": 879, "70%":615, "50%":440, "25%":220}, c:0.42},
        {max: 1162000, h:{"100%":948, "70%":664, "50%":474, "25%":237}, c:0.42},
        {max: 1395000, h:{"100%":1028, "70%":720, "50%":514, "25%":257}, c:0.42},
        {max: 1625000, h:{"100%":1074, "70%":752, "50%":537, "25%":269}, c:0.42},
        {max: 1860000, h:{"100%":1108, "70%":776, "50%":554, "25%":277}, c:0.42},
        {max: 2325000, h:{"100%":1154, "70%":808, "50%":577, "25%":289}, c:0.42},
        {max: 2790000, h:{"100%":1188, "70%":832, "50%":594, "25%":297}, c:0.42},
        {max: 3255000, h:{"100%":1235, "70%":865, "50%":618, "25%":309}, c:0.42},
        {max: 3720000, h:{"100%":1268, "70%":888, "50%":634, "25%":317}, c:0.42},
        {max: 4185000, h:{"100%":1314, "70%":920, "50%":657, "25%": 329}, c:0.42},
        {max: 4650000, h:{"100%":1348, "70%":944, "50%":674, "25%":337}, c:0.42},
        {max: Infinity, h:{"100%":1394, "70%":976, "50%":697, "25%":349}, c:0.42}
    ];

    const PRIV = [
        {max: 37000, h:{"100%":261, "70%":183, "50%":131, "25%":65}, c:0.22},
        {max: 55800, h:{"100%":304, "70%":213, "50%":152, "25%":76}, c:0.42},
        {max: 74400, h:{"100%":336, "70%":235, "50%":168, "25%":84}, c:0.42},
        {max: 93000, h:{"100%":380, "70%":266, "50%":190, "25%":95}, c:0.42},
        {max: 139500, h:{"100%":412, "70%":288, "50%":206, "25%":103}, c:0.42},
        {max: 186000, h:{"100%":456, "70%":319, "50%":228, "25%":114}, c:0.42},
        {max: 232400, h:{"100%":488, "70%":342, "50%":244, "25%":122}, c:0.42},
        {max: 280000, h:{"100%":532, "70%":372, "50%":266, "25%":133}, c:0.42},
        {max: 370000, h:{"100%":564, "70%":395, "50%":282, "25%":141}, c:0.42},
        {max: 465000, h:{"100%":640, "70%":448, "50%":320, "25%":160}, c:0.42},
        {max: 695000, h:{"100%":716, "70%":501, "50%":358, "25%":179}, c:0.42},
        {max: 930000, h:{"100%": 835, "70%":585, "50%":418, "25%":209}, c:0.42},
        {max: 1162000, h:{"100%":900, "70%":630, "50%":450, "25%":225}, c:0.42},
        {max: 1395000, h:{"100%":976, "70%":683, "50%":488, "25%":244}, c:0.42},
        {max: 1625000, h:{"100%":1020, "70%":714, "50%":510, "25%":255}, c:0.42},
        {max: 1860000, h:{"100%":1052, "70%":736, "50%":526, "25%":263}, c:0.42},
        {max: 2325000, h:{"100%":1096, "70%":767, "50%":548, "25%":274}, c:0.42},
        {max: 2790000, h:{"100%":1128, "70%":790, "50%":564, "25%":282}, c:0.42},
        {max: 3255000, h:{"100%":1173, "70%":821, "50%":587, "25%":293}, c:0.42},
        {max: 3720000, h:{"100%":1204, "70%":843, "50%":602, "25%":301}, c:0.42},
        {max: 4185000, h:{"100%":1248, "70%":874, "50%":624, "25%": 312}, c:0.42},
        {max: 4650000, h:{"100%":1280, "70%":896, "50%":640, "25%":320}, c:0.42},
        {max: Infinity, h:{"100%":1324, "70%":927, "50%":662, "25%":331}, c:0.42}
    ];

    // ESECUZIONE DIRETTA E IMMEDIATA DEL CODICE
    const inp = document.getElementById('boxValoreInput');
    const sel = document.getElementById('boxTipoAtto');
    const headerUI = document.getElementById('boxHeaderUI');
    const onorarioUI = document.getElementById('boxOnorarioUI');
    const valoreImputatoUI = document.getElementById('boxValoreImputatoUI');
    const risultatiUI = document.getElementById('boxRisultatiUI');
    const pubRadio = document.getElementById('pub');
    const lblVal = document.getElementById('lblVal');
    
    const fmt = new Intl.NumberFormat('it-IT', { style: 'currency', currency: 'EUR' });

    function avviaCalcolo() {
        if (!inp || !sel) return;

        if (inp.value.trim() === "") {
            if (headerUI) headerUI.textContent = "Attesa inserimento valore";
            if (onorarioUI) onorarioUI.textContent = "";
            if (valoreImputatoUI) valoreImputatoUI.textContent = "";
            if (risultatiUI) risultatiUI.innerHTML = "";
            return;
        }

        const raw = inp.value.replace(/\./g, "").replace(",", ".");
        const val = parseFloat(raw) || 0;
        const ePub = pubRadio ? pubRadio.checked : true;
        const db = ePub ? PUB : PRIV;
        const scelta = sel.value;

        let onorario = 0;
        let cPerc = 0.42;

        if (scelta.startsWith("FISSO_")) {
            onorario = parseInt(scelta.split("_")[1]);
            if (lblVal) lblVal.style.opacity = "0.3";
        } else {
            if (lblVal) lblVal.style.opacity = "1";
            const f = db.find(x => val <= x.max) || db[db.length-1];
            onorario = f.h[scelta] || 0;
            cPerc = f.c;
        }

        if (onorario > 0) {
            const tArch = Math.round(onorario * 0.10 * 100) / 100;
            const cNaz = Math.round(onorario * cPerc * 100) / 100;
            const cCons = Math.round(onorario * 0.04 * 100) / 100;
            const fGar = Math.round(onorario * 0.002 * 100) / 100;
            const assic = Math.round(onorario * 0.06 * 100) / 100;

            const totA = tArch + cNaz + cCons + fGar + assic;
            const baseIva = cNaz + cCons + fGar + assic;
            const ivaB = Math.round(baseIva * 0.22 * 100) / 100;

            const txtAtto = sel.options[sel.selectedIndex] ? sel.options[sel.selectedIndex].text : "";
            
            const txtAttoLower = txtAtto.toLowerCase();
            let eticheVal = "Valore Euro: ";
            
            if (txtAttoLower.includes("compravendita")) {
                eticheVal = "Prezzo Dichiarato in Atto euro: ";
            } else if (txtAttoLower.includes("mutuo")) {
                eticheVal = "Iscrizione ipotecaria per euro: ";
            } else if (txtAttoLower.includes("donazione")) {
                eticheVal = "Valore dichiarato nella donazione: ";
            } else if (txtAttoLower.includes("divisione")) {
                eticheVal = "Valore della MASSA DIVISIONALE euro: ";
            } else if (txtAttoLower.includes("assegnazione")) {
                eticheVal = "Prezzo di cessione euro: ";
            }

            if (headerUI) headerUI.textContent = txtAtto;
            if (onorarioUI) onorarioUI.textContent = "Onorario Repertorio: " + fmt.format(onorario);
            if (valoreImputatoUI) valoreImputatoUI.textContent = eticheVal + inp.value;
            
            // Diciture inserite in modo identico e testuale alla tua richiesta
            if (risultatiUI) risultatiUI.innerHTML = `
                <div class="row"><span>tassa archivio</span><span>${fmt.format(tArch)}</span></div>
                <div class="row"><span>cassa naz.notariato</span><span>${fmt.format(cNaz)}</span></div>
                <div class="row"><span>cassa cons. notariato</span><span>${fmt.format(cCons)}</span></div>
                <div class="row"><span>fondo garanzia</span><span>${fmt.format(fGar)}</span></div>
                <div class="row"><span>assicur obbligatoria</span><span>${fmt.format(assic)}</span></div>
                
                <div class="bold-row row"><span>A) - il totale dei valori dei campi sopra descritti</span><span>${fmt.format(totA)}</span></div>
                <div class="bold-row row"><span>B) - l'IVA al 22% (sulla somma dei valori di "cassa naz.notariato", "cassa cons. notariato", "fondo garanzia" e "assicur obbligatoria")</span><span>${fmt.format(ivaB)}</span></div>
                
                <div class="math-line"></div>
                <div class="grand-total"><span>TOTALE di A) + B)</span><span>${fmt.format(totA + ivaB)}</span></div>
            `;
        }
    }

    function pulisciTutto() {
        if (inp) {
            inp.value = "";
            inp.focus();
        }
        if (sel) sel.selectedIndex = 0;
        avviaCalcolo();
    }

    const btnStampa = document.getElementById('btnStampa');
    const btnReset = document.getElementById('btnReset');
    if (btnStampa) btnStampa.addEventListener('click', () => window.print());
    if (btnReset) btnReset.addEventListener('click', pulisciTutto);

    if (inp) {
        inp.addEventListener('input', function(e) {
            let v = e.target.value.replace(/[^\d,]/g, ""); 
            let pts = v.split(",");
            pts[0] = pts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ".");
            e.target.value = pts.join(",");
            avviaCalcolo();
        });
    }

    if (sel) sel.addEventListener('change', avviaCalcolo);
    document.querySelectorAll('input[name="forma"]').forEach(r => r.addEventListener('change', avviaCalcolo));
</script>
</body>
</html>
