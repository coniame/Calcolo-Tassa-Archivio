<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Calcolatore Repertorio Notarile PRO</title>
    <style>
        :root { --primary: #2c3e50; --accent: #e67e22; --danger: #e74c3c; --success: #27ae60; --blue: #2980b9; }
        body { font-family: -apple-system, system-ui, sans-serif; background: #f0f3f5; padding: 15px; margin: 0; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h1 { font-size: 0.9rem; text-align: center; color: var(--primary); text-transform: uppercase; margin-bottom: 20px; letter-spacing: 1px; }
        label { display: block; margin-top: 15px; font-weight: bold; font-size: 0.85rem; color: #555; }
        
        select, input { 
            width: 100%; padding: 14px; margin-top: 5px; border: 1px solid #ddd; border-radius: 10px; 
            font-size: 16px; box-sizing: border-box; background-color: #fff;
        }

        .btn-forma { display: flex; gap: 5px; margin-top: 5px; }
        .btn-forma input { display: none; }
        .btn-forma label { flex: 1; background: #eee; padding: 12px; text-align: center; border-radius: 8px; cursor: pointer; margin: 0; font-weight: normal; font-size: 0.8rem; }
        .btn-forma input:checked + label { background: var(--primary); color: white; font-weight: bold; }

        .red-label { color: var(--danger); font-size: 0.75rem; font-weight: bold; display: block; margin: 10px 0; text-align: center; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        
        /* Layout per i dettagli richiesti */
        .result-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 0.85rem; color: #444; }
        .bold-section { margin-top: 15px; border-top: 1px dashed #ccc; padding-top: 10px; }
        .bold-row { display: flex; justify-content: space-between; font-weight: bold; font-size: 0.95rem; color: #000; margin-bottom: 5px; }
        
        .divider { border-top: 2px solid #000; margin: 10px 0; }
        
        .total-box { text-align: right; padding: 10px 0; }
        .grand-total-label { font-size: 0.75rem; color: #666; font-weight: bold; display: block; }
        .grand-total-val { font-size: 2.2rem; font-weight: 800; color: var(--accent); }

        .blue-alert { background: #eef7ff; color: var(--blue); padding: 10px; border-radius: 8px; font-size: 0.75rem; margin-top: 10px; border-left: 4px solid var(--blue); font-weight: 500; }
        .reset-btn { width: 100%; background: #95a5a6; color: white; border: none; padding: 10px; border-radius: 8px; margin-top: 20px; font-size: 0.8rem; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>Calcolo Repertorio Completo</h1>

    <div class="btn-forma">
        <input type="radio" name="forma" id="pub" value="pub" checked><label for="pub">ATTO PUBBLICO</label>
        <input type="radio" name="forma" id="priv" value="priv"><label for="priv">SCRITTURA PRIVATA</label>
    </div>

    <label>Tipo di Atto / Riduzione</label>
    <select id="manualPercChoice">
        <option value="100%">Misura Intera (100%)</option>
        <option value="70%">Prezzo-Valore (70%)</option>
        <option value="50%">Riduzione 50% (es. Mutuo Fondiario)</option>
        <option value="25%">Riduzione 75% (Paga 25%)</option>
        <option value="FISSO">Onorario Fisso</option>
    </select>

    <label>Valore Atto / Ipoteca (€)</label>
    <input type="number" id="valoreAtto" inputmode="decimal" placeholder="Inserisci importo...">
    
    <div id="hintMutuo" class="blue-alert" style="display:none;">ℹ️ Per i mutui, inserire il VALORE IPOTECARIO.</div>

    <span id="onorarioRed" class="red-label">Onorario di riferimento: 0,00 €</span>

    <div id="dettagliScomposizione">
        </div>

    <button class="reset-btn" onclick="window.location.reload()">RESET CALCOLO</button>
</div>

<script>
    // DATI ESTRATTI DAI CSV ORIGINALI (23 SCAGLIONI)
    const TAB_PUB = [
        {max: 37000, h100: 275, h50: 138, h25: 69, h70: 193, cassa: 0.22},
        {max: 55800, h100: 320, h50: 160, h25: 80, h70: 224, cassa: 0.42},
        {max: 74400, h100: 354, h50: 177, h25: 89, h70: 248, cassa: 0.42},
        {max: 93000, h100: 400, h50: 200, h25: 100, h70: 280, cassa: 0.42},
        {max: 139500, h100: 434, h50: 217, h25: 109, h70: 304, cassa: 0.42},
        {max: 186000, h100: 480, h50: 240, h25: 120, h70: 336, cassa: 0.42},
        {max: 232400, h100: 514, h50: 257, h25: 129, h70: 360, cassa: 0.42},
        {max: 280000, h100: 560, h50: 280, h25: 140, h70: 392, cassa: 0.42},
        {max: 370000, h100: 594, h50: 297, h25: 149, h70: 416, cassa: 0.42},
        {max: 465000, h100: 674, h50: 337, h25: 169, h70: 472, cassa: 0.42},
        {max: 695000, h100: 754, h50: 377, h25: 189, h70: 528, cassa: 0.42},
        {max: 930000, h100: 879, h50: 440, h25: 220, h70: 615, cassa: 0.42},
        {max: 1162000, h100: 948, h50: 474, h25: 237, h70: 664, cassa: 0.42},
        {max: 1395000, h100: 1028, h50: 514, h25: 257, h70: 720, cassa: 0.42},
        {max: 1625000, h100: 1074, h50: 537, h25: 269, h70: 752, cassa: 0.42},
        {max: 1860000, h100: 1108, h50: 554, h25: 277, h70: 776, cassa: 0.42},
        {max: 2325000, h100: 1154, h50: 577, h25: 289, h70: 808, cassa: 0.42},
        {max: 2790000, h100: 1188, h50: 594, h25: 297, h70: 832, cassa: 0.42},
        {max: 3255000, h100: 1235, h50: 618, h25: 309, h70: 865, cassa: 0.42},
        {max: 3720000, h100: 1268, h50: 634, h25: 317, h70: 888, cassa: 0.42},
        {max: 4185000, h100: 1314, h50: 657, h25: 329, h70: 920, cassa: 0.42},
        {max: 4650000, h100: 1348, h50: 674, h25: 337, h70: 944, cassa: 0.42},
        {max: Infinity, h100: 1394, h50: 697, h25: 349, h70: 976, cassa: 0.42}
    ];

    const TAB_PRIV = [
        {max: 37000, h100: 261, h50: 131, h25: 65, h70: 183, cassa: 0.22},
        {max: 55800, h100: 304, h50: 152, h25: 76, h70: 213, cassa: 0.42},
        {max: 74400, h100: 336, h50: 168, h25: 84, h70: 235, cassa: 0.42},
        {max: 93000, h100: 380, h50: 190, h25: 95, h70: 266, cassa: 0.42},
        {max: 139500, h100: 412, h50: 206, h25: 103, h70: 288, cassa: 0.42},
        {max: 186000, h100: 456, h50: 228, h25: 114, h70: 319, cassa: 0.42},
        {max: 232400, h100: 488, h50: 244, h25: 122, h70: 342, cassa: 0.42},
        {max: 280000, h100: 532, h50: 266, h25: 133, h70: 372, cassa: 0.42},
        {max: 370000, h100: 564, h50: 282, h25: 141, h70: 395, cassa: 0.42},
        {max: 465000, h100: 640, h50: 320, h25: 160, h70: 448, cassa: 0.42},
        {max: 695000, h100: 716, h50: 358, h25: 179, h70: 501, cassa: 0.42},
        {max: 930000, h100: 835, h50: 418, h25: 209, h70: 585, cassa: 0.42},
        {max: 1162000, h100: 900, h50: 450, h25: 225, h70: 630, cassa: 0.42},
        {max: 1395000, h100: 976, h50: 488, h25: 244, h70: 683, cassa: 0.42},
        {max: 1625000, h100: 1020, h50: 510, h25: 255, h70: 714, cassa: 0.42},
        {max: 1860000, h100: 1052, h50: 526, h25: 263, h70: 736, cassa: 0.42},
        {max: 2325000, h100: 1096, h50: 548, h25: 274, h70: 767, cassa: 0.42},
        {max: 2790000, h100: 1128, h50: 564, h25: 282, h70: 790, cassa: 0.42},
        {max: 3255000, h100: 1173, h50: 587, h25: 293, h70: 821, cassa: 0.42},
        {max: 3720000, h100: 1204, h50: 602, h25: 301, h70: 843, cassa: 0.42},
        {max: 4185000, h100: 1248, h50: 624, h25: 312, h70: 874, cassa: 0.42},
        {max: 4650000, h100: 1280, h50: 640, h25: 320, h70: 896, cassa: 0.42},
        {max: Infinity, h100: 1324, h50: 662, h25: 331, h70: 927, cassa: 0.42}
    ];

    function formatCur(val) {
        return val.toLocaleString('it-IT', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + " €";
    }

    function update() {
        const valoreAtto = parseFloat(document.getElementById('valoreAtto').value) || 0;
        const percChoice = document.getElementById('manualPercChoice').value;
        const isPub = document.getElementById('pub').checked;
        const tabella = isPub ? TAB_PUB : TAB_PRIV;
        
        document.getElementById('hintMutuo').style.display = (percChoice === '50%') ? 'block' : 'none';

        let onorario = 0;
        let aliquotaCassa = 0.42; // Default

        if (percChoice === 'FISSO') {
            onorario = isPub ? 91 : 86; // Stima basata su tabella finale
            aliquotaCassa = 0.42;
        } else {
            const fascia = tabella.find(f => valoreAtto <= f.max);
            if (percChoice === '100%') onorario = fascia.h100;
            if (percChoice === '50%') onorario = fascia.h50;
            if (percChoice === '25%') onorario = fascia.h25;
            if (percChoice === '70%') onorario = fascia.h70;
            aliquotaCassa = fascia.cassa;
        }

        // Calcoli scomposizione
        const tassaArchivio = onorario * 0.10;
        const cassaNaz = onorario * aliquotaCassa;
        const cassaCons = onorario * 0.04;
        const fondoGar = onorario * 0.002;
        const assicurazione = onorario * 0.06;

        // A) Totale campi sopra
        const totaleA = tassaArchivio + cassaNaz + cassaCons + fondoGar + assicurazione;

        // B) IVA 22% (esclusa tassa archivio)
        const baseIVA = cassaNaz + cassaCons + fondoGar + assicurazione;
        const iva = baseIVA * 0.22;

        const totaleFinale = totaleA + iva;

        // Aggiornamento UI
        document.getElementById('onorarioRed').textContent = `Onorario di riferimento (${percChoice}): ${formatCur(onorario)}`;

        let html = `
            <div class="result-row"><span>Tassa Archivio (10%):</span><span>${formatCur(tassaArchivio)}</span></div>
            <div class="result-row"><span>Cassa Naz. Notariato (${(aliquotaCassa*100).toFixed(0)}%):</span><span>${formatCur(cassaNaz)}</span></div>
            <div class="result-row"><span>Cassa Cons. Notariato (4%):</span><span>${formatCur(cassaCons)}</span></div>
            <div class="result-row"><span>Fondo Garanzia (0,20%):</span><span>${formatCur(fondoGar)}</span></div>
            <div class="result-row"><span>Assicurazione Obblig. (6%):</span><span>${formatCur(assicurazione)}</span></div>
            
            <div class="bold-section">
                <div class="bold-row">
                    <span>A) - Totale Tasse e Contributi:</span>
                    <span>${formatCur(totaleA)}</span>
                </div>
                <div class="bold-row">
                    <span>B) - IVA 22% su Cassa e Fondi:</span>
                    <span>${formatCur(iva)}</span>
                </div>
            </div>

            <div class="divider"></div>

            <div class="total-box">
                <span class="grand-total-label">TOTALE DA VERSARE (A + B)</span>
                <span class="grand-total-val">${formatCur(totaleFinale)}</span>
            </div>
        `;

        document.getElementById('dettagliScomposizione').innerHTML = html;
    }

    document.querySelectorAll('input, select').forEach(el => el.addEventListener('input', update));
    update();
</script>
</body>
</html>
